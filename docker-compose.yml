services:
  ticket-assigner:
    build:
      context: .
      target: production
    # Sobe apenas o emulador de Functions — Firestore aponta para o projeto real
    command: firebase emulators:start --only functions --project $FB_PROJECT_ID
    ports:
      - "5001:5001"   # Functions
      - "4000:4000"   # Emulator UI
    env_file:
      - .env
    volumes:
      - ./secrets:/app/secrets   # service account do Firebase
      - ./lib:/app/lib
